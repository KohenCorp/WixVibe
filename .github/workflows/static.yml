name: Deploy WixVibe Site
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authorize Wix Registry
        run: |
          echo "@wix:registry=https://npm.wixpress.com" > .npmrc
          echo "//://npm.wixpress.com{{ secrets.WIX_NPM_TOKEN }}" >> .npmrc
          echo "always-auth=true" >> .npmrc

      - name: Install Dependencies
        # Added flags to prevent npm from hanging on background tasks
        run: npm install --no-audit --no-fund --loglevel info

      - name: Build Project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
