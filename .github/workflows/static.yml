name: Force Deploy WixVibe Site
on:
  push:
    branches: ["main"] # Change to "master" if that is your branch name
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Force)
        # The "|| true" tells GitHub to keep going even if Wix private packages fail
        run: npm install --prefer-offline --no-audit || true

      - name: Build Project
        # We use 'npx astro build' to bypass the 'wix' command requirement
        run: npx astro build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
